<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAYAM | Login</title>
    
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-card {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        h2 { color: var(--text); margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1.2rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #64748b; }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--primary); }
        .btn-auth {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }
        .btn-auth:hover { background: #4f46e5; }
        .switch-page { margin-top: 1.5rem; color: #64748b; }
        .switch-page a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="logo">SAHAYAM</div>
    <h2>Sign In</h2>

        

    <form action="/login" method="POST">
        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" 
                   placeholder="Enter username" 
                   pattern="[A-Za-z0-9]+" 
                   title="Usernames only contain letters and numbers" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" 
                   placeholder="••••••••" 
                   required>
        </div>
        <button type="submit" class="btn-auth">Login</button>
    </form>
    <div class="switch-page">
        New user? <a href="/register">Create an account</a>
    </div>
</div>

<style>
    /* Add this to your internal CSS for error alerts */
    .error-msg {
        background-color: #fee2e2;
        color: #dc2626;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 1rem;
        font-size: 0.9rem;
        border: 1px solid #fecaca;
    }
</style>
</body>
</html>
