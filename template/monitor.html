<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAYAM | Active Monitor</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Background Image - AI Generated Concept */
        .bg-image {
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1639322537228-f710d846310a?q=80&w=1920&auto=format&fit=crop'); 
            height: 100%; background-position: center; background-repeat: no-repeat; background-size: cover;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }

        .monitor-box { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 3rem; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); color: white; max-width: 400px; width: 90%; }
        
        .radar { width: 100px; height: 100px; border: 4px solid #10b981; border-radius: 50%; margin: 0 auto 20px; position: relative; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }

        .status-text { font-size: 1.2rem; font-weight: bold; color: #10b981; text-transform: uppercase; letter-spacing: 2px; }
        .instruction { font-size: 0.9rem; margin-top: 10px; opacity: 0.8; }

        /* SOS Modal */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; text-align: center; border: 10px solid #ffcc00; animation: flash-red 1s infinite; }
        @keyframes flash-red { 0% { border-color: #ffcc00; } 50% { border-color: #ff0000; } 100% { border-color: #ffcc00; } }
        
        .btn-safe { background: #10b981; color: white; padding: 20px 40px; border: none; border-radius: 50px; font-size: 1.5rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="bg-image">
        <div class="monitor-box">
            <div class="radar"></div>
            <div class="status-text">Monitoring Active</div>
            <p class="instruction">Keep this screen on. We will check on you every 10 minutes.</p>
            <p id="timer-display" style="font-family: monospace; font-size: 1.5rem; margin-top: 20px;">00:00</p>
        </div>
    </div>

    <div id="safety-modal" class="modal">
        <div class="modal-content">
            <h1 style="color: #ef4444; font-size: 2.5rem; margin: 0;">ARE YOU SAFE?</h1>
            <p style="color: #1e293b;">Confirm within 60 seconds or SOS will trigger.</p>
            <button class="btn-safe" onclick="confirmSafety()">I AM SAFE</button>
        </div>
    </div>

    
        <script>
        let checkTimer;
        let missedPrompts = 0;
        let userLat, userLng;

        // Get GPS location
        navigator.geolocation.watchPosition(pos => {
            userLat = pos.coords.latitude;
            userLng = pos.coords.longitude;
        });

        document.getElementById('start-btn').onclick = async function() {
            // Request Wake Lock
            if ('wakeLock' in navigator) {
                await navigator.wakeLock.request('screen');
            }
            startSafetyCycle(600000); // Start with 10 mins (600,000 ms)
            document.getElementById('status').innerText = "Status: Monitoring...";
        };

        function startSafetyCycle(interval) {
            clearTimeout(checkTimer);
            checkTimer = setTimeout(showPrompt, interval);
        }

        function showPrompt() {
            document.getElementById('safety-modal').style.display = 'block';
            // Play a sound here if possible
            
            // Wait 1 minute for response
            checkTimer = setTimeout(() => {
                missedPrompts++;
                if (missedPrompts >= 3) {
                    triggerSOS();
                } else {
                    showPrompt(); // Repeat every minute
                }
            }, 600); 
        }

        function confirmSafety() {
            document.getElementById('safety-modal').style.display = 'none';
            missedPrompts = 0;
            startSafetyCycle(600); // Reset back 
        }

        function triggerSOS() {
            fetch('/send_sos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({lat: userLat, lng: userLng})
            }).then(res => alert("Emergency Contacts Notified!"));
        }
    </script>
    
    
</body>
</html>
